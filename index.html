<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrius · Аналитика встреч</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #080810;
  --bg2:      #0D0D18;
  --bg-card:  #10101C;
  --bg-card2: #13131F;
  --border:   rgba(255,255,255,0.07);
  --border-orange: rgba(255,107,43,0.35);
  --orange:   #FF6B2B;
  --orange2:  #FF8C57;
  --orange-dim: rgba(255,107,43,0.12);
  --purple:   #7C3AED;
  --purple-dim: rgba(124,58,237,0.15);
  --green:    #22C55E;
  --red:      #EF4444;
  --red-dim:  rgba(239,68,68,0.12);
  --yellow:   #F59E0B;
  --text:     #EEEEF8;
  --muted:    #8888A8;
  --muted2:   #55556A;
  --fh: 'Space Grotesk', sans-serif;
  --fb: 'Inter', sans-serif;
  --fm: 'JetBrains Mono', monospace;
  --r:  12px;
  --rl: 20px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--fb);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  min-height: 100vh;
}

/* ===== HEADER ===== */
.header {
  position: relative;
  overflow: hidden;
  padding: 32px 32px 28px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
}
.header__bg { position: absolute; inset: 0; pointer-events: none; }
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(100px);
}
.orb--1 {
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(124,58,237,0.25) 0%, transparent 70%);
  top: -200px; left: -100px;
}
.orb--2 {
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(255,107,43,0.15) 0%, transparent 70%);
  top: -150px; right: -80px;
}
.grid-bg {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 48px 48px;
}
.header__inner {
  position: relative;
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}
.header__left { display: flex; align-items: center; gap: 16px; }
.logo-icon {
  width: 42px; height: 42px;
  background: linear-gradient(135deg, var(--purple), var(--orange));
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--fh);
  font-weight: 800; font-size: 14px; color: #fff;
  flex-shrink: 0;
  box-shadow: 0 8px 24px rgba(124,58,237,0.4);
}
.header h1 {
  font-family: var(--fh);
  font-weight: 800; font-size: 1.4rem;
  letter-spacing: -0.5px;
  color: var(--text);
}
.header .subtitle {
  font-size: 0.8rem; color: var(--muted);
  font-family: var(--fb); margin-top: 2px;
}
.pulse-dot {
  display: inline-block;
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 2s infinite;
  margin-right: 6px;
}
@keyframes pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
  50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(34,197,94,0); }
}
.updated-badge {
  font-family: var(--fm);
  font-size: 0.72rem;
  color: var(--muted2);
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  padding: 6px 14px;
  border-radius: 100px;
}

/* ===== CONTAINER ===== */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 28px 24px;
}

/* ===== TABS ===== */
.tabs {
  display: flex; gap: 8px;
  margin-bottom: 28px;
  flex-wrap: wrap;
}
.tab {
  padding: 8px 20px;
  border-radius: 100px;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: 0.85rem;
  font-weight: 600;
  font-family: var(--fh);
  transition: all 0.2s;
  white-space: nowrap;
}
.tab:hover { border-color: var(--border-orange); color: var(--orange2); }
.tab.active {
  background: linear-gradient(135deg, var(--purple), var(--orange));
  border-color: transparent;
  color: #fff;
  box-shadow: 0 4px 16px rgba(124,58,237,0.35);
}

/* ===== STATS ===== */
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 14px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--rl);
  padding: 22px 24px;
  transition: border-color 0.2s, transform 0.2s;
  position: relative;
  overflow: hidden;
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--purple), var(--orange));
  opacity: 0;
  transition: opacity 0.2s;
}
.stat-card:hover { border-color: var(--border-orange); transform: translateY(-2px); }
.stat-card:hover::before { opacity: 1; }
.stat-card .label {
  font-family: var(--fh);
  font-size: 0.7rem;
  color: var(--muted2);
  text-transform: uppercase;
  letter-spacing: 1.2px;
  font-weight: 700;
  margin-bottom: 10px;
}
.stat-card .value {
  font-family: var(--fh);
  font-size: 2rem;
  font-weight: 800;
  color: var(--text);
  line-height: 1;
  margin-bottom: 6px;
}
.stat-card .sub { font-size: 0.78rem; color: var(--muted); }
.bottleneck-value { color: var(--red) !important; font-size: 1.1rem !important; }
.trend-up   { color: var(--green); font-weight: 700; }
.trend-down { color: var(--red); font-weight: 700; }
.trend-same { color: var(--muted); font-weight: 700; }

/* ===== CARDS ===== */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--rl);
  overflow: hidden;
  margin-bottom: 20px;
  transition: border-color 0.2s;
}
.card:hover { border-color: rgba(124,58,237,0.2); }
.card-header {
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  font-weight: 700;
  font-size: 0.85rem;
  font-family: var(--fh);
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.badge {
  padding: 3px 12px;
  border-radius: 100px;
  font-size: 0.71rem;
  font-weight: 700;
  font-family: var(--fh);
  white-space: nowrap;
}
.badge-bottleneck {
  background: rgba(239,68,68,0.12);
  color: var(--red);
  border: 1px solid rgba(239,68,68,0.2);
  animation: glow-red 2s ease-in-out infinite;
}
@keyframes glow-red {
  0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.15); }
  50% { box-shadow: 0 0 10px 2px rgba(239,68,68,0.15); }
}
.badge-new {
  background: var(--purple-dim);
  color: #A78BFA;
  border: 1px solid rgba(124,58,237,0.2);
}

/* ===== TABLE ===== */
.scroll-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th {
  background: var(--bg-card2);
  padding: 10px 8px;
  text-align: center;
  font-family: var(--fh);
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--muted2);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
th.th-left { text-align: left; padding-left: 24px; }
th.th-bottleneck { background: rgba(239,68,68,0.06); color: var(--red); }

td {
  padding: 10px 8px;
  text-align: center;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  font-size: 1rem;
  transition: background 0.15s;
}
tr:hover td { background: rgba(255,255,255,0.02); }
td.td-date {
  text-align: left;
  padding-left: 24px;
  font-family: var(--fm);
  font-size: 0.78rem;
  color: var(--muted);
  white-space: nowrap;
  min-width: 110px;
}
td.td-teacher { font-size: 0.77rem; color: var(--muted2); white-space: nowrap; }
td.td-score { font-family: var(--fh); font-weight: 800; font-size: 0.9rem; }
td.td-bottleneck { background: rgba(239,68,68,0.04); }

.dot {
  display: inline-flex;
  width: 30px; height: 30px;
  border-radius: 8px;
  align-items: center; justify-content: center;
  font-size: 0.9rem;
}
.dot-ok   { background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.2); }
.dot-warn { background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.2); }
.dot-fail { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.2); }
.dot-none { background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: var(--muted2); font-size: 0.6rem; }

tr.tr-new { background: rgba(124,58,237,0.03); }
tr.tr-sep td {
  padding: 8px 24px;
  background: rgba(255,255,255,0.02);
  font-family: var(--fm);
  font-size: 0.7rem;
  color: var(--muted2);
  font-weight: 600;
  text-align: left;
  text-transform: uppercase;
  letter-spacing: 1px;
  border-bottom: 1px solid var(--border);
  border-top: 1px solid var(--border);
}

/* ===== COMPARISON TABLE ===== */
.cmp-row-label {
  text-align: left;
  padding-left: 24px;
  font-family: var(--fh);
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--muted);
  white-space: nowrap;
}
.trend-na { color: var(--muted2); }
.avg-val { font-family: var(--fh); font-size: 0.85rem; font-weight: 700; }

/* ===== BAR CHART ===== */
.bars {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  height: 72px;
  padding: 14px 24px 16px;
}
.bar-wrap { display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; }
.bar {
  width: 100%;
  border-radius: 5px 5px 0 0;
  min-height: 3px;
  transition: height 0.8s cubic-bezier(0.4,0,0.2,1);
}
.bar-ok   { background: linear-gradient(to top, rgba(34,197,94,0.4), rgba(34,197,94,0.8)); }
.bar-warn { background: linear-gradient(to top, rgba(245,158,11,0.4), rgba(245,158,11,0.8)); }
.bar-low  { background: linear-gradient(to top, rgba(239,68,68,0.4), rgba(239,68,68,0.8)); }
.bar-label { font-family: var(--fm); font-size: 0.65rem; color: var(--muted2); font-weight: 600; }
.bars-legend {
  padding: 0 24px 14px;
  font-size: 0.7rem;
  color: var(--muted2);
  line-height: 1.8;
  font-family: var(--fb);
}

/* ===== EMPTY ===== */
.empty { text-align: center; padding: 72px 20px; color: var(--muted2); }
.empty .icon { font-size: 2.5rem; margin-bottom: 16px; }
.empty p { font-size: 0.9rem; line-height: 1.7; color: var(--muted); }
.empty code {
  font-family: var(--fm);
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  padding: 2px 8px; border-radius: 6px;
  color: var(--orange);
}

/* ===== SCAN LINE ANIMATION FOR TABLE HEADER ===== */
.card-header { position: relative; overflow: hidden; }

/* ===== ANIMATIONS ===== */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}
.reveal {
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.5s ease, transform 0.5s ease;
}
.reveal.in { opacity: 1; transform: none; }

.header__inner { animation: fadeInUp 0.6s ease both; }
.stats { animation: fadeInUp 0.6s 0.1s ease both; }
.tabs  { animation: fadeInUp 0.6s 0.05s ease both; }

/* ===== MOBILE ===== */
@media (max-width: 700px) {
  .header { padding: 20px 16px; }
  .container { padding: 16px 12px; }
  .dot { width: 26px; height: 26px; font-size: 0.8rem; }
  td.td-date { padding-left: 14px; }
  th.th-left { padding-left: 14px; }
  .stat-card { padding: 18px; }
  .stat-card .value { font-size: 1.6rem; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header__bg">
    <div class="orb orb--1"></div>
    <div class="orb orb--2"></div>
    <div class="grid-bg"></div>
  </div>
  <div class="header__inner">
    <div class="header__left">
      <div class="logo-icon">M</div>
      <div>
        <h1>Matrius · Аналитика</h1>
        <div class="subtitle">
          <span class="pulse-dot"></span>Оценка преподавателей по 8 этапам вводного урока
        </div>
      </div>
    </div>
    <div class="updated-badge" id="last-updated">загрузка…</div>
  </div>
</header>

<div class="container">
  <div class="tabs" id="tabs"></div>
  <div id="stats" class="stats"></div>
  <div id="content"></div>
</div>

<script>
const STAGE_NAMES = {
  "1":"Представление","2":"Знакомство","3":"О Matrius",
  "4":"План урока","5":"Цели ребёнка","6":"Диагностика",
  "7":"Прощание","8":"Продажа"
};
const STAGE_SHORT = {
  "1":"Предст.","2":"Знаком.","3":"Matrius",
  "4":"План","5":"Цели","6":"Диагн.","7":"Прощ.","8":"Продажа"
};

function scoreVal(s) {
  if (s==="✅") return 2;
  if (s==="⚠️") return 1;
  if (s==="❌") return 0;
  return null;
}
function dotClass(s) {
  if (s==="✅") return "dot-ok";
  if (s==="⚠️") return "dot-warn";
  if (s==="❌") return "dot-fail";
  return "dot-none";
}
function totalPct(stages) {
  let sum=0, cnt=0;
  for (let i=1;i<=8;i++) {
    const v=scoreVal((stages||{})[i]);
    if (v!==null){sum+=v;cnt++;}
  }
  return cnt ? Math.round(sum/(cnt*2)*100) : null;
}
function pctColor(p) {
  if (p>=75) return "var(--green)";
  if (p>=50) return "var(--yellow)";
  return "var(--red)";
}
function avgByStage(lessons) {
  const sums={},cnts={};
  for (const l of lessons) {
    for (let i=1;i<=8;i++) {
      const k=String(i), v=scoreVal((l.stages||{})[k]);
      if (v!==null){sums[k]=(sums[k]||0)+v;cnts[k]=(cnts[k]||0)+1;}
    }
  }
  const out={};
  for (const k of Object.keys(sums)) out[k]=sums[k]/cnts[k];
  return out;
}
function bottleneckStage(lessons) {
  const avgs=avgByStage(lessons);
  let minK=null,minV=Infinity;
  for (const [k,v] of Object.entries(avgs)) if(v<minV){minV=v;minK=k;}
  return minK;
}
function fmtDate(d) {
  if (!d) return "—";
  const [y,m,day]=d.split("-");
  return `${day}.${m}.${y}`;
}
function sortDesc(lessons) {
  return [...lessons].sort((a,b)=>{
    const da=(a.date||"")+(a.time||""),db=(b.date||"")+(b.time||"");
    return db.localeCompare(da);
  });
}
function splitBaselineNew(lessons) {
  const asc=[...lessons].sort((a,b)=>{
    const da=(a.date||"")+(a.time||""),db=(b.date||"")+(b.time||"");
    return da.localeCompare(db);
  });
  return {baseline:asc.slice(0,Math.min(10,asc.length)),newOnes:asc.slice(10)};
}

let allLessons=[], currentTeacher="Все";

async function loadData() {
  try {
    const r=await fetch("data.json?t="+Date.now());
    const d=await r.json();
    return d.lessons||[];
  } catch(e){ console.error(e); return []; }
}

function renderTabs(lessons) {
  const teachers=["Все",...Array.from(new Set(lessons.map(l=>l.teacher))).sort()];
  document.getElementById("tabs").innerHTML=teachers.map(t=>
    `<button class="tab ${t===currentTeacher?"active":""}" onclick="select('${t}')">${t}</button>`
  ).join("");
}

function select(t){ currentTeacher=t; renderAll(); }
function filtered() {
  return currentTeacher==="Все" ? allLessons : allLessons.filter(l=>l.teacher===currentTeacher);
}

function renderStats(lessons) {
  const el=document.getElementById("stats");
  if (!lessons.length){el.innerHTML="";return;}
  const {baseline,newOnes}=splitBaselineNew(lessons);
  const btn=bottleneckStage(baseline);
  const btnName=btn?STAGE_NAMES[btn]:"—";
  const baseAvgs=avgByStage(baseline);
  const overallAvg=Object.values(baseAvgs).length
    ? Math.round(Object.values(baseAvgs).reduce((a,b)=>a+b,0)/Object.values(baseAvgs).length/2*100)
    : 0;
  let trendHtml="";
  if (newOnes.length>0&&btn) {
    const newAvgs=avgByStage(newOnes);
    const diff=(newAvgs[btn]??0)-(baseAvgs[btn]??0);
    if(diff>0.25) trendHtml=`<span class="trend-up">↑ улучшение</span>`;
    else if(diff<-0.25) trendHtml=`<span class="trend-down">↓ просадка</span>`;
    else trendHtml=`<span class="trend-same">→ без изменений</span>`;
  }
  el.innerHTML=`
    <div class="stat-card">
      <div class="label">Всего встреч</div>
      <div class="value">${lessons.length}</div>
      <div class="sub">${newOnes.length>0?`${newOnes.length} новых поверх базы`:"все в базе (≤10)"}</div>
    </div>
    <div class="stat-card">
      <div class="label">Средний балл — база</div>
      <div class="value" style="color:${pctColor(overallAvg)}">${overallAvg}%</div>
      <div class="sub">по первым ${baseline.length} встречам</div>
    </div>
    <div class="stat-card">
      <div class="label">Узкое место (база)</div>
      <div class="value bottleneck-value">${btn?`Этап ${btn}`:"—"}</div>
      <div class="sub">${btnName} ${trendHtml}</div>
    </div>
  `;
  // reveal animation
  document.querySelectorAll('.stat-card').forEach((el,i)=>{
    el.style.animation=`fadeInUp 0.5s ${0.05*i+0.15}s ease both`;
  });
}

function lessonRow(l,isNew,btn,showTeacher) {
  const pct=totalPct(l.stages||{});
  const cells=[1,2,3,4,5,6,7,8].map(i=>{
    const k=String(i),s=(l.stages||{})[k],isBn=k===btn;
    return `<td class="${isBn?"td-bottleneck":""}">
      <span class="dot ${dotClass(s)}">${s||"·"}</span>
    </td>`;
  }).join("");
  const scoreHtml=pct!==null
    ? `<td class="td-score" style="color:${pctColor(pct)}">${pct}%</td>`
    : `<td class="td-score" style="color:var(--muted2)">—</td>`;
  const teacherTd=showTeacher?`<td class="td-teacher">${l.teacher||""}</td>`:"";
  return `<tr class="${isNew?"tr-new":""}">
    <td class="td-date">${fmtDate(l.date)}${l.time?" "+l.time:""}</td>
    ${teacherTd}${cells}${scoreHtml}
  </tr>`;
}

function renderTable(lessons) {
  if (!lessons.length) {
    return `<div class="empty">
      <div class="icon">📊</div>
      <p>Нет данных.<br>Отправь транскрипт в бот командой <code>/analiz</code></p>
    </div>`;
  }
  const {baseline,newOnes}=splitBaselineNew(lessons);
  const btn=bottleneckStage(baseline.length?baseline:lessons);
  const showTeacher=currentTeacher==="Все";
  const stageHeaders=[1,2,3,4,5,6,7,8].map(i=>
    `<th class="${String(i)===btn?"th-bottleneck":""}">${STAGE_SHORT[String(i)]}</th>`
  ).join("");
  const teacherHeader=showTeacher?"<th>Препод.</th>":"";
  const baseDesc=sortDesc(baseline),newDesc=sortDesc(newOnes);
  let rows="";
  if (newOnes.length>0) {
    rows+=`<tr class="tr-sep"><td colspan="100">🆕 Новые встречи — ${newOnes.length} шт.</td></tr>`;
    rows+=newDesc.map(l=>lessonRow(l,true,btn,showTeacher)).join("");
    rows+=`<tr class="tr-sep"><td colspan="100">📋 База — первые ${baseline.length} встреч</td></tr>`;
  }
  rows+=baseDesc.map(l=>lessonRow(l,false,btn,showTeacher)).join("");
  const btnBadge=btn
    ?`<span class="badge badge-bottleneck">⚠ Этап ${btn} — ${STAGE_NAMES[btn]}</span>`:"";
  return `<div class="card reveal">
    <div class="card-header">
      Встречи по этапам ${btnBadge}
      ${newOnes.length>0?`<span class="badge badge-new">+${newOnes.length} новых</span>`:""}
    </div>
    <div class="scroll-wrap">
      <table>
        <thead><tr>
          <th class="th-left">Дата</th>${teacherHeader}${stageHeaders}<th>Балл</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

function renderBars(lessons) {
  if (lessons.length<3) return "";
  const {baseline}=splitBaselineNew(lessons);
  const avgs=avgByStage(baseline.length?baseline:lessons);
  const bars=[1,2,3,4,5,6,7,8].map(i=>{
    const k=String(i),v=avgs[k]??0,pct=Math.round(v/2*100);
    const h=Math.max(4,Math.round(v/2*52));
    const cls=pct>=75?"bar-ok":pct>=50?"bar-warn":"bar-low";
    return `<div class="bar-wrap">
      <div class="bar ${cls}" style="height:${h}px" title="${STAGE_NAMES[k]}: ${pct}%"></div>
      <div class="bar-label">${i}</div>
    </div>`;
  }).join("");
  return `<div class="card reveal">
    <div class="card-header">Средний балл по этапам (база)</div>
    <div class="bars">${bars}</div>
    <div class="bars-legend">
      ${[1,2,3,4,5,6,7,8].map(i=>`${i} — ${STAGE_NAMES[String(i)]}`).join(" &nbsp;·&nbsp; ")}
    </div>
  </div>`;
}

function renderComparison(lessons) {
  const {baseline,newOnes}=splitBaselineNew(lessons);
  if (!newOnes.length||!baseline.length) return "";
  const baseAvgs=avgByStage(baseline),newAvgs=avgByStage(newOnes);
  function fmt(v){return v!==undefined?Math.round(v/2*100)+"%":"—";}
  function trendIcon(bv,nv){
    if(nv===undefined||bv===undefined) return `<span class="trend-na">—</span>`;
    const d=nv-bv;
    if(d>0.25) return `<span class="trend-up">↑</span>`;
    if(d<-0.25) return `<span class="trend-down">↓</span>`;
    return `<span class="trend-same">→</span>`;
  }
  const btn=bottleneckStage(baseline);
  const heads=[1,2,3,4,5,6,7,8].map(i=>
    `<th class="${String(i)===btn?"th-bottleneck":""}">${STAGE_SHORT[String(i)]}</th>`
  ).join("");
  const baseRow=[1,2,3,4,5,6,7,8].map(i=>
    `<td class="avg-val ${String(i)===btn?"td-bottleneck":""}">${fmt(baseAvgs[String(i)])}</td>`
  ).join("");
  const newRow=[1,2,3,4,5,6,7,8].map(i=>
    `<td class="avg-val ${String(i)===btn?"td-bottleneck":""}">${fmt(newAvgs[String(i)])}</td>`
  ).join("");
  const trendRow=[1,2,3,4,5,6,7,8].map(i=>
    `<td class="${String(i)===btn?"td-bottleneck":""}">${trendIcon(baseAvgs[String(i)],newAvgs[String(i)])}</td>`
  ).join("");
  return `<div class="card reveal">
    <div class="card-header">
      Сравнение: новые встречи vs база
      <span style="font-size:0.75rem;color:var(--muted2);font-weight:400">${newOnes.length} новых / ${baseline.length} в базе</span>
    </div>
    <div class="scroll-wrap">
      <table>
        <thead><tr><th class="th-left" style="min-width:130px"></th>${heads}</tr></thead>
        <tbody>
          <tr><td class="cmp-row-label">База (среднее)</td>${baseRow}</tr>
          <tr><td class="cmp-row-label">Новые (среднее)</td>${newRow}</tr>
          <tr><td class="cmp-row-label">Динамика</td>${trendRow}</tr>
        </tbody>
      </table>
    </div>
  </div>`;
}

function renderAll() {
  const data=filtered();
  renderStats(data);
  document.getElementById("content").innerHTML=
    renderBars(data)+renderTable(data)+renderComparison(data);
  // scroll reveal
  const observer=new IntersectionObserver(entries=>{
    entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add("in"); });
  },{threshold:0.08});
  document.querySelectorAll('.reveal').forEach(el=>observer.observe(el));
}

async function init() {
  allLessons=await loadData();
  const upd=document.getElementById("last-updated");
  if (allLessons.length) {
    const latest=allLessons.reduce((a,b)=>a.date>b.date?a:b);
    upd.textContent="Обновлено: "+fmtDate(latest.date);
  } else {
    upd.textContent="нет данных";
  }
  renderTabs(allLessons);
  renderAll();
}

init();
</script>
</body>
</html>
